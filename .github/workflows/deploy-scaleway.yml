# Build + push image Docker vers le registry, puis redéploie le conteneur.
#
# ── Secrets GitHub (Settings → Secrets and variables → Actions → Secrets) ──
# Noms neutres = mêmes que ton .env (pas de préfixe cloud).
#
# Obligatoires :
#   SECRET_ACCESS_KEY              Secret Access Key (login registry + API)
#   PLATFORM_CLERK_PUBLISHABLE_KEY pk_… Clerk plateforme
#   NEXT_PUBLIC_APP_URL            URL publique
#
# Recommandés :
#   SCW_CONTAINER_ID               UUID du conteneur Scaleway (pas le namespace)
#                                  → spécifique Scaleway ; pas besoin sur Amplify/AWS
#   REGION                         ex. fr-par (défaut fr-par)
#   REGISTRY                       ex. rg.fr-par.scw.cloud
#   IMAGE_NAME                     ex. scolia/docslapro
#   NEXT_PUBLIC_PLATFORM_APP_URL
#   PLATFORM_APP_URL
#   PLATFORM_HOSTNAMES
#   NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST
#
# Runtime conteneur (console cloud, pas GitHub) :
#   PLATFORM_CLERK_SECRET_KEY, ACCESS_KEY_ID, SECRET_ACCESS_KEY, MISTRAL_API_KEY, …

name: Deploy container

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.REGISTRY || 'rg.fr-par.scw.cloud' }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME || 'scolia/docslapro' }}
  REGION: ${{ secrets.REGION || 'fr-par' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier les secrets requis
        env:
          SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS_KEY }}
          PLATFORM_CLERK_PUBLISHABLE_KEY: ${{ secrets.PLATFORM_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          missing=0
          for name in SECRET_ACCESS_KEY PLATFORM_CLERK_PUBLISHABLE_KEY NEXT_PUBLIC_APP_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Secret GitHub manquant ou vide : $name"
              missing=1
            else
              eval "len=\${#${name}}"
              echo "$name : présent (${len} caractères)"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "→ Settings → Secrets and variables → Actions → onglet Secrets (pas Variables)"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SECRET_ACCESS_KEY }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            PLATFORM_CLERK_PUBLISHABLE_KEY=${{ secrets.PLATFORM_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.PLATFORM_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_PLATFORM_APP_URL=${{ secrets.NEXT_PUBLIC_PLATFORM_APP_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
            NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST=${{ secrets.NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST || 'scolia-images.s3.fr-par.scw.cloud' }}
            PLATFORM_APP_URL=${{ secrets.PLATFORM_APP_URL }}
            PLATFORM_HOSTNAMES=${{ secrets.PLATFORM_HOSTNAMES }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Redeploy container
        env:
          SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS_KEY }}
          SCW_CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}
          REGION: ${{ env.REGION }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "${SCW_CONTAINER_ID:-}" ]; then
            echo "::warning::SCW_CONTAINER_ID non défini — image poussée, redéploie manuellement dans la console."
            exit 0
          fi

          IMAGE_REF="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          BASE="https://api.scaleway.com/containers/v1/regions/${REGION}/containers/${SCW_CONTAINER_ID}"

          echo "Conteneur ${SCW_CONTAINER_ID} → image ${IMAGE_REF}"
          code=$(curl -sS -o /tmp/container.json -w "%{http_code}" \
            -H "X-Auth-Token: ${SECRET_ACCESS_KEY}" \
            "${BASE}") || true

          if [ "$code" != "200" ]; then
            echo "::error::Conteneur introuvable (HTTP $code). Corps: $(cat /tmp/container.json)"
            curl -sS -H "X-Auth-Token: ${SECRET_ACCESS_KEY}" \
              "https://api.scaleway.com/containers/v1/regions/${REGION}/containers" \
              -o /tmp/containers-list.json || true
            python3 -c "import json; d=json.load(open('/tmp/containers-list.json')); items=d.get('containers') or []; print('  (aucun)') if not items else [print('  - %s  id=%s' % (c.get('name','?'), c.get('id'))) for c in items]"
            exit 1
          fi

          name=$(python3 -c "import json;print(json.load(open('/tmp/container.json')).get('name','?'))")
          echo "Conteneur trouvé : $name — mise à jour registry_image + redeploy"

          # Pointer explicitement sur le tag du commit (évite le cache :latest)
          upd=$(curl -sS -o /tmp/container-upd.json -w "%{http_code}" -X PATCH \
            -H "X-Auth-Token: ${SECRET_ACCESS_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"registry_image\":\"${IMAGE_REF}\"}" \
            "${BASE}")
          if [ "$upd" != "200" ]; then
            echo "::error::PATCH registry_image échoué (HTTP $upd) : $(cat /tmp/container-upd.json)"
            exit 1
          fi

          # Sur API v1, le PATCH redéploie déjà souvent ; on force quand même
          redeploy=$(curl -sS -o /tmp/container-redeploy.json -w "%{http_code}" -X POST \
            -H "X-Auth-Token: ${SECRET_ACCESS_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${BASE}/redeploy") || true
          if [ "$redeploy" = "200" ] || [ "$redeploy" = "201" ]; then
            echo "OK — redéploiement déclenché (HTTP $redeploy)."
            exit 0
          fi
          if [ "$redeploy" = "409" ]; then
            echo "OK — conteneur déjà en cours de déploiement (HTTP 409, normal après PATCH)."
            exit 0
          fi
          echo "::error::Redeploy échoué (HTTP $redeploy) : $(cat /tmp/container-redeploy.json)"
          exit 1
