# Build + push image Docker vers Scaleway Container Registry,
# puis redéploie le Serverless Container (si SCW_CONTAINER_ID est configuré).
#
# Secrets GitHub (Settings → Secrets and variables → Actions) :
#   SCW_SECRET_KEY                      — clé secrète Scaleway (login registry + API)
#   SCW_CONTAINER_ID                    — (optionnel) ID du conteneur à redéployer
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY   — pk_… Clerk
#   NEXT_PUBLIC_APP_URL                 — URL publique de l'app (ex. https://app.scolia.fr)
#   NEXT_PUBLIC_PLATFORM_APP_URL        — (optionnel)
#   NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST    — (optionnel) défaut scolia-images.s3.fr-par.scw.cloud
#   PLATFORM_APP_URL                    — (optionnel)
#   PLATFORM_HOSTNAMES                  — (optionnel)
#   PLATFORM_CLERK_PUBLISHABLE_KEY      — (optionnel)

name: Deploy Scaleway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-scaleway-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: rg.fr-par.scw.cloud
  IMAGE_NAME: scolia/docslapro
  SCW_REGION: fr-par

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_PLATFORM_APP_URL=${{ secrets.NEXT_PUBLIC_PLATFORM_APP_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
            NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST=${{ secrets.NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST || 'scolia-images.s3.fr-par.scw.cloud' }}
            PLATFORM_APP_URL=${{ secrets.PLATFORM_APP_URL }}
            PLATFORM_HOSTNAMES=${{ secrets.PLATFORM_HOSTNAMES }}
            PLATFORM_CLERK_PUBLISHABLE_KEY=${{ secrets.PLATFORM_CLERK_PUBLISHABLE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Redeploy Scaleway container
        env:
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}
          SCW_REGION: ${{ env.SCW_REGION }}
        run: |
          if [ -z "${SCW_CONTAINER_ID:-}" ]; then
            echo "SCW_CONTAINER_ID non défini — image poussée, redéploie manuellement dans la console Scaleway."
            exit 0
          fi
          echo "Redéploiement du conteneur $SCW_CONTAINER_ID…"
          curl -fsS -X POST \
            -H "X-Auth-Token: ${SCW_SECRET_KEY}" \
            -H "Content-Type: application/json" \
            "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID}/deploy"
          echo
          echo "OK — déploiement déclenché."
