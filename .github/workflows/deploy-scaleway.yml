# Build + push image Docker → Scaleway Container Registry,
# puis redéploie le Serverless Container.
#
# ── Secrets GitHub (Settings → Secrets and variables → Actions → Secrets) ──
#
# Obligatoires (mêmes noms que dans ton .env) :
#   SECRET_ACCESS_KEY              Secret Access Key Scaleway
#                                  → docker login -u nologin -p …
#                                  (PAS l’Access Key ID qui commence par SCW…)
#   PLATFORM_CLERK_PUBLISHABLE_KEY pk_… Clerk plateforme
#   NEXT_PUBLIC_APP_URL            URL publique
#
# Recommandés :
#   SCW_CONTAINER_ID               UUID du conteneur (auto-redeploy)
#   NEXT_PUBLIC_PLATFORM_APP_URL
#   PLATFORM_APP_URL
#   PLATFORM_HOSTNAMES
#   NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST
#
# Runtime conteneur Scaleway (pas GitHub) :
#   PLATFORM_CLERK_SECRET_KEY, ACCESS_KEY_ID, SECRET_ACCESS_KEY, MISTRAL_API_KEY, …

name: Deploy Scaleway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-scaleway-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: rg.fr-par.scw.cloud
  IMAGE_NAME: scolia/docslapro
  SCW_REGION: fr-par

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vérifier les secrets requis
        env:
          SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS_KEY }}
          PLATFORM_CLERK_PUBLISHABLE_KEY: ${{ secrets.PLATFORM_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          missing=0
          for name in SECRET_ACCESS_KEY PLATFORM_CLERK_PUBLISHABLE_KEY NEXT_PUBLIC_APP_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Secret GitHub manquant ou vide : $name"
              missing=1
            else
              eval "len=\${#${name}}"
              echo "$name : présent (${len} caractères)"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "→ Settings → Secrets and variables → Actions → onglet Secrets (pas Variables)"
            echo "→ Nom exact : SECRET_ACCESS_KEY (comme dans ton .env)"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: nologin
          password: ${{ secrets.SECRET_ACCESS_KEY }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            PLATFORM_CLERK_PUBLISHABLE_KEY=${{ secrets.PLATFORM_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.PLATFORM_CLERK_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_PLATFORM_APP_URL=${{ secrets.NEXT_PUBLIC_PLATFORM_APP_URL }}
            NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
            NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
            NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST=${{ secrets.NEXT_PUBLIC_SCOLA_IMAGE_CDN_HOST || 'scolia-images.s3.fr-par.scw.cloud' }}
            PLATFORM_APP_URL=${{ secrets.PLATFORM_APP_URL }}
            PLATFORM_HOSTNAMES=${{ secrets.PLATFORM_HOSTNAMES }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Redeploy Scaleway container
        env:
          SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS_KEY }}
          SCW_CONTAINER_ID: ${{ secrets.SCW_CONTAINER_ID }}
          SCW_REGION: ${{ env.SCW_REGION }}
        run: |
          if [ -z "${SCW_CONTAINER_ID:-}" ]; then
            echo "SCW_CONTAINER_ID non défini — image poussée, redéploie manuellement."
            exit 0
          fi
          echo "Redéploiement du conteneur $SCW_CONTAINER_ID…"
          curl -fsS -X POST \
            -H "X-Auth-Token: ${SECRET_ACCESS_KEY}" \
            -H "Content-Type: application/json" \
            "https://api.scaleway.com/containers/v1beta1/regions/${SCW_REGION}/containers/${SCW_CONTAINER_ID}/deploy"
          echo
          echo "OK — déploiement déclenché."
