version: 1

applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22
            - nvm use 22
            - npm install
        build:
          commands:
            - echo "ACCESS_KEY_ID=$ACCESS_KEY_ID" >> .env.production
            - echo "SECRET_ACCESS_KEY=$SECRET_ACCESS_KEY" >> .env.production
            - echo "REGION=$REGION" >> .env.production
            - echo "REGISTRY_BUCKET=$REGISTRY_BUCKET" >> .env.production
            - echo "CLERK_ENCRYPTION_KEY=$CLERK_ENCRYPTION_KEY" >> .env.production
            - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env.production
            - echo "NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=$NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL" >> .env.production
            - echo "NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=$NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL" >> .env.production
            - echo "PLATFORM_APP_URL=$PLATFORM_APP_URL" >> .env.production
            - echo "NEXT_PUBLIC_PLATFORM_APP_URL=$PLATFORM_APP_URL" >> .env.production
            - echo "PLATFORM_HOSTNAMES=$PLATFORM_HOSTNAMES" >> .env.production
            - echo "PLATFORM_CLERK_PUBLISHABLE_KEY=$PLATFORM_CLERK_PUBLISHABLE_KEY" >> .env.production
            - echo "PLATFORM_CLERK_SECRET_KEY=$PLATFORM_CLERK_SECRET_KEY" >> .env.production
            - echo "TRAVEL_EMAIL_INGEST_SECRET=$TRAVEL_EMAIL_INGEST_SECRET" >> .env.production
            - echo "OCR_WORKER_SECRET=$OCR_WORKER_SECRET" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:

          - "**/*"
      cache:
        paths:
          - node_modules/**/*